[metadata]
name = "Flux-Nothing"
version = "1.0"
author = "Flux-OS Contributors"
description = "Nothing (R) inspired minimalist theme for Flux-OS"

[colors]
# Primary palette - Minimalist black, white, and grays
black = "#000000"
white = "#FFFFFF"
dark_gray = "#1a1a1a"
light_gray = "#f5f5f5"
medium_gray = "#808080"
accentGray = "#999999"

[typography]
primary_font = "Inter"
fallback_fonts = ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"]
body_size = "14px"
heading_size = "18px"
small_size = "12px"
line_height = "1.6"

[spacing]
base_unit = "8px"
small = "4px"
medium = "8px"
large = "16px"
extra_large = "24px"

[components]
# Window chrome
window_background = "#ffffff"
window_border = "#f0f0f0"
window_shadow = "rgba(0, 0, 0, 0.08)"

# Buttons
button_background = "#f5f5f5"
button_text = "#000000"
button_hover = "#e8e8e8"
button_active = "#d0d0d0"

# Text
text_primary = "#000000"
text_secondary = "#666666"
text_disabled = "#cccccc"

[animations]
enable_animations = true
prefer_reduced_motion = true
transition_duration = "200ms"
transition_easing = "cubic-bezier(0.4, 0, 0.2, 1)"
